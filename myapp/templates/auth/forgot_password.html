{% extends 'base.html' %}

{% block title %}Forgot Password - NotesApp{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card animate-fade" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Reset Password</h2>
            <p style="color: var(--text-muted);">Enter your email or username to receive an OTP.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Email or Username</label>
                <input type="text" name="identifier" class="input-field" required placeholder="e.g. john@example.com" style="margin-bottom: 0;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 3.5rem;">
                <i data-lucide="mail"></i> Send OTP
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <p style="color: var(--text-muted);">
                Remember your password? <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
