{% extends 'base.html' %}

{% block title %}Login - NotesApp{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card animate-fade" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Welcome Back</h2>
            <p style="color: var(--text-muted);">Sign in to your account</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Username</label>
                <input type="text" name="username" class="input-field" required placeholder="Enter username" style="margin-bottom: 0;">
            </div>
            
            <div style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label style="color: var(--text-muted); font-size: 0.9rem;">Password</label>
                    <a href="{% url 'forgot_password' %}" style="color: var(--primary); font-size: 0.85rem; text-decoration: none; font-weight: 600;">Forgot Password?</a>
                </div>
                <input type="password" name="password" class="input-field" required placeholder="Enter password" style="margin-bottom: 0;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 3.5rem;">
                <i data-lucide="log-in"></i> Sign In
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <p style="color: var(--text-muted);">
                Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
