{% extends 'base.html' %}

{% block title %}Verify OTP - NotesApp{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card animate-fade" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="width: 60px; height: 60px; background: rgba(139, 92, 246, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                <i data-lucide="key" style="color: var(--primary); width: 32px; height: 32px;"></i>
            </div>
            <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Verify OTP</h2>
            <p style="color: var(--text-muted);">We sent a 6-digit code to your email.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Enter OTP</label>
                <input type="text" name="otp" class="input-field" required placeholder="123456" maxlength="6" style="margin-bottom: 0; text-align: center; font-size: 1.5rem; letter-spacing: 4px;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 3.5rem;">
                Verify Code
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Didn't receive code? <a href="{% url 'forgot_password' %}" style="color: var(--primary); text-decoration: none;">Try again</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
