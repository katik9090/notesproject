{% extends 'base.html' %}

{% block title %}Register - NotesApp{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card animate-fade" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Create Account</h2>
            <p style="color: var(--text-muted);">Start your organized life</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Username</label>
                <input type="text" name="username" class="input-field" required placeholder="Pick a username" style="margin-bottom: 0;">
            </div>

            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Email</label>
                <input type="email" name="email" class="input-field" required placeholder="you@example.com" style="margin-bottom: 0;">
            </div>
            
            <div style="margin-bottom: 2rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Password</label>
                <div style="position: relative;">
                    <input type="password" name="password" class="input-field" required placeholder="Create password" style="margin-bottom: 0; padding-right: 3rem;">
                    <button type="button" class="password-toggle-btn" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; height: 100%; width: 40px; padding: 0;">
                        <i data-lucide="eye" style="width: 20px; height: 20px;"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 3.5rem;">
                <i data-lucide="sparkles"></i> Sign Up
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <p style="color: var(--text-muted);">
                Already have an account? <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
