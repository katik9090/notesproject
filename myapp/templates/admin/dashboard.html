{% extends 'base.html' %}

{% block title %}Admin Dashboard - NotesApp{% endblock %}

{% block content %}
<div style="max-width: 1000px; margin: 0 auto;">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem;">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="btn glass-card" style="padding: 0.75rem; border-color: rgba(34, 197, 94, 0.4); cursor: default;"><i data-lucide="shield" style="color: #22c55e;"></i></div>
            <h1 style="font-size: 2.5rem; font-weight: 700;">Admin Dashboard</h1>
        </div>
        <div style="display: flex; gap: 1rem;">
            <a href="{% url 'custom_admin_users' %}" class="btn btn-primary"><i data-lucide="users"></i> Manage Users</a>
            <a href="{% url 'custom_admin_notes' %}" class="btn glass-card"><i data-lucide="file-text"></i> All Notes</a>
        </div>
    </div>

    <div class="glass-card animate-fade">
        <h2 style="margin-bottom: 2rem;">Platform Overview</h2>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
            <div class="glass-card" style="background: rgba(139, 92, 246, 0.1); border-color: rgba(139, 92, 246, 0.3);">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                    <div style="width: 48px; height: 48px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white;">
                        <i data-lucide="users"></i>
                    </div>
                    <div>
                        <h3 style="color: var(--text-muted); font-size: 1rem;">Total Users</h3>
                        <div style="font-size: 2rem; font-weight: 700;">{{ users_count }}</div>
                    </div>
                </div>
            </div>

            <div class="glass-card" style="background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.3);">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                    <div style="width: 48px; height: 48px; background: #22c55e; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white;">
                        <i data-lucide="file-text"></i>
                    </div>
                    <div>
                        <h3 style="color: var(--text-muted); font-size: 1rem;">Total Notes</h3>
                        <div style="font-size: 2rem; font-weight: 700;">{{ notes_count }}</div>
                    </div>
                </div>
            </div>

            <div class="glass-card" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3);">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                    <div style="width: 48px; height: 48px; background: #ef4444; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white;">
                        <i data-lucide="user-plus"></i>
                    </div>
                    <div>
                        <h3 style="color: var(--text-muted); font-size: 1rem;">Pending Approvals</h3>
                        <div style="font-size: 2rem; font-weight: 700; color: #ef4444;">{{ pending_users }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
