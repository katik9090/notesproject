{% extends 'base.html' %}

{% block title %}Verify OTP - NotesApp{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-card animate-fade" style="width: 100%; max-width: 400px; padding: 2.5rem; text-align: center;">
        <div style="margin-bottom: 2rem;">
            <h2 style="font-size: 1.75rem; margin-bottom: 1rem;">Verification Code</h2>
            <p style="color: var(--text-muted);">Please enter the 6-digit code sent to your email.</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 2rem;">
                <input type="text" name="otp" class="input-field" required placeholder="000000" maxlength="6" 
                       style="text-align: center; font-size: 2rem; letter-spacing: 0.5rem; height: 4rem; margin-bottom: 0;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 3.5rem;">
                Verify & Login <i data-lucide="check-circle"></i>
            </button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Didn't receive the code? 
                <a href="{% url 'resend_otp' %}" id="resend-btn" style="color: var(--primary); font-weight: 600; text-decoration: none; pointer-events: none; opacity: 0.5; transition: all 0.3s ease;">
                    Resend OTP <span id="timer">(30s)</span>
                </a>
            </p>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                let timeLeft = 30;
                const timerSpan = document.getElementById('timer');
                const resendBtn = document.getElementById('resend-btn');

                const interval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(interval);
                        timerSpan.textContent = '';
                        resendBtn.style.pointerEvents = 'auto';
                        resendBtn.style.opacity = '1';
                    } else {
                        timerSpan.textContent = `(${timeLeft}s)`;
                    }
                }, 1000);
            });
        </script>
    </div>
</div>
{% endblock %}
