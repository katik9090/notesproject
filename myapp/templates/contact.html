{% extends 'base.html' %}

{% block title %}Contact Us - NotesApp{% endblock %}

{% block content %}
<div style="max-width: 1000px; margin: 0 auto; padding-top: 2rem;">
    <h1 style="font-size: 2.5rem; margin-bottom: 2rem; text-align: center; font-weight: 700; color: white;">Get in Touch</h1>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem;">
        
        <!-- Contact Form -->
        <div class="glass-card">
            <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <i data-lucide="mail"></i> Send us a Message
            </h2>
            <form method="POST" action="{% url 'contact' %}">
                {% csrf_token %}
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Your Name</label>
                    <input type="text" name="name" class="input-field" required placeholder="John Doe">
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Email Address</label>
                    <input type="email" name="email" class="input-field" required placeholder="john@example.com">
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem;">Message</label>
                    <textarea name="message" class="input-field" rows="5" required placeholder="How can we help you?"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i data-lucide="send"></i> Send Message
                </button>
            </form>
        </div>

        <!-- Contact Info & Map -->
        <div style="display: flex; flex-direction: column; gap: 2rem;">
            
            <div class="glass-card">
                <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="map-pin"></i> Our Location
                </h2>
                <div style="border-radius: 12px; overflow: hidden; border: 1px solid var(--glass-border); height: 250px;">
                    <!-- Embedded Google Map -->
                    <iframe src="https://www.google.com/maps/embed?pb=!3m2!1sen!2sin!4v1780463074187!5m2!1sen!2sin!6m8!1m7!1s-ZxhzmhqMK_PiZ8lMx-MBw!2m2!1d22.25160584917663!2d70.8144608251825!3f191.04638124917614!4f-22.76171112462734!5f0.7820865974627469" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>

            <!-- WhatsApp Chat Button -->
            <div class="glass-card" style="text-align: center;">
                <h3 style="margin-bottom: 1rem; color: var(--text-muted);">Need instant support?</h3>
                <a href="https://wa.me/+917863084523?text=Hello%20NotesApp%20Team,%20I%20need%20help" target="_blank" class="btn" style="background: #25D366; color: white; width: 100%; justify-content: center; font-size: 1.1rem; padding: 1rem;">
                    <i data-lucide="message-circle" style="width: 24px; height: 24px;"></i> Chat on WhatsApp
                </a>
            </div>

        </div>

    </div>
</div>
{% endblock %}
